<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Send me a message</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="table.html">My Pricelist</a>
        </nav>
    </header>
    <main>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Tell me your name">
            <br><br>
            <label for="email">Email:</label>
            <input type="email" placeholder="What's your email address?">
            <br><br>
            <label for="message">Purpose of message:</label>
            <select name="purpose" id="purpose">
                <option value="why are you writing me?">Why are you writing me?</option>
                <option value="inquiry">I want to ask you a question</option>
                <option value="booking">I want to book you</option>
                <option value="general">I want to chat</option>
            </select>
            <br><br>
            <label for="">Message:</label>
            <textarea name="" id="" placeholder="Type your message here"></textarea>
            <br><br>
            <button>Send Message</button>
        </form>
    </main>
</body>
</html>
