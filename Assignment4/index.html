<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="first">
          <h1>To-Do List</h1>
          <p>Add a task and keep to it.</p>
          <form id="form">
            <input
              type="text"
              placeholder="Type to add a task..."
              id="formInput"
            />
            <button id="addButton">ADD</button>
          </form>
        </div>
        <p id="message"></p>
        <div id="todoList"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
